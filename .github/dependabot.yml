# Dependabot configuration
# Cooldown delays updating normal npm dependencies by 7 days but allows security updates to be processed immediately.
# Note: Cooldown is not supported for the github-actions ecosystem.
# Reference: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '1 3 19 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'jpawlowski'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    ignore:
      # Keep React on major version 18 until @iobroker/adapter-react-v5 supports React 19
      - dependency-name: 'react'
        update-types: [ 'version-update:semver-major' ]
      - dependency-name: 'react-dom'
        update-types: [ 'version-update:semver-major' ]
      - dependency-name: '@types/react'
        update-types: [ 'version-update:semver-major' ]
      - dependency-name: '@types/react-dom'
        update-types: [ 'version-update:semver-major' ]
      # Keep MUI on major version 6 until @iobroker/adapter-react-v5 supports a newer MUI major
      - dependency-name: '@mui/material'
        update-types: [ 'version-update:semver-major' ]
      - dependency-name: '@mui/icons-material'
        update-types: [ 'version-update:semver-major' ]
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '1 3 19 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'jpawlowski'
